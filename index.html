<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷笑话生成器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow-x: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.06) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04) 0%, transparent 40%);
    pointer-events: none;
  }
  .container {
    text-align: center;
    padding: 20px;
    max-width: 960px;
    width: 100%;
  }
  h1 {
    font-size: 28px;
    color: #fff;
    margin-bottom: 8px;
  }
  .subtitle {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    margin-bottom: 20px;
  }

  /* toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 20px;
    font-size: 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .tab-btn:focus-visible {
    outline: 2px solid #fff;
    outline-offset: 2px;
  }
  .tab-btn:hover { background: rgba(255,255,255,0.25); }
  .tab-btn.active {
    background: #fff;
    color: #667eea;
    border-color: #fff;
    font-weight: 600;
  }

  /* joke cards */
  .card {
    display: flex;
    gap: 16px;
    max-width: 900px;
    margin: 0 auto 28px;
  }
  .joke-card {
    flex: 1;
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    padding: 28px 24px;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    min-width: 0; /* 允许 flex 子元素在文本溢出时正确截断 */
  }
  .joke-card .joke-index {
    display: block;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 12px;
    font-weight: 600;
    align-self: flex-start;
    margin-bottom: 14px;
  }
  .joke-card .joke-text {
    flex: 1;
    font-size: 15px;
    color: #444;
    line-height: 1.8;
    text-align: left;
    margin-bottom: 16px;
  }
  .joke-card .actions {
    display: flex;
    gap: 8px;
    align-self: flex-end;
    margin-top: auto;
  }
  .icon-btn {
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .icon-btn:focus-visible {
    outline: 2px solid #667eea;
    outline-offset: 2px;
  }
  .icon-btn:hover { border-color: #667eea; color: #667eea; }
  .icon-btn.copied { border-color: #52c41a; color: #52c41a; background: #f6ffed; }

  .joke-card .icon-btn {
    background: none;
    color: #999;
    padding: 4px 12px;
    font-size: 12px;
  }
  .joke-card .fav-btn { font-size: 14px; padding: 4px 10px; }
  .joke-card .fav-btn.faved { border-color: #f5222d; color: #f5222d; background: #fff1f0; }

  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    padding: 12px 36px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(102,126,234,0.4);
  }
  .btn:focus-visible {
    outline: 2px solid #fff;
    outline-offset: 3px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
  .btn:active { transform: translateY(0); }

  /* favorites panel */
  .fav-panel {
    display: none;
    max-width: 900px;
    margin: 0 auto 28px;
  }
  .fav-list {
    max-height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .fav-item {
    background: rgba(255,255,255,0.95);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .fav-item .fav-num {
    color: #999;
    font-size: 12px;
    font-weight: 600;
    min-width: 20px;
  }
  .fav-item .fav-text {
    flex: 1;
    font-size: 15px;
    color: #444;
    line-height: 1.7;
  }
  .fav-item .icon-btn {
    font-size: 12px;
    padding: 4px 14px;
    background: #fff;
    color: #666;
  }
  .fav-item .del-btn {
    color: #f5222d;
    border-color: #f5222d;
  }
  .fav-item .del-btn:hover {
    color: #fff;
    background: #f5222d;
    border-color: #f5222d;
  }
  .fav-empty {
    color: rgba(255,255,255,0.6);
    padding: 40px;
    font-size: 15px;
  }

  #debug {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    margin-bottom: 12px;
  }

  @media (max-width: 640px) {
    .card { flex-direction: column; max-width: 400px; }
  }

  .bubble {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.12;
  }
  .b1 { width: 200px; height: 200px; background: #fff; top: 10%; left: 5%; animation: float 8s ease-in-out infinite; }
  .b2 { width: 120px; height: 120px; background: #fff; top: 60%; right: 8%; animation: float 6s ease-in-out 1s infinite; }
  .b3 { width: 80px; height: 80px; background: #fff; bottom: 15%; left: 15%; animation: float 7s ease-in-out 2s infinite; }
  .b4 { width: 150px; height: 150px; background: #fff; top: 20%; right: 20%; animation: float 9s ease-in-out 0.5s infinite; }
  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }
  @media (prefers-reduced-motion: reduce) {
    .b1, .b2, .b3, .b4 { animation: none; }
    .btn { transition: none; }
    .btn:hover { transform: none; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="bubble b1" aria-hidden="true"></div>
  <div class="bubble b2" aria-hidden="true"></div>
  <div class="bubble b3" aria-hidden="true"></div>
  <div class="bubble b4" aria-hidden="true"></div>
  <h1>🥶 冷笑话生成器</h1>
  <p class="subtitle">每次三条，专治各种不冷</p>

  <div class="toolbar">
    <button class="tab-btn active" id="tabRandom">随机</button>
    <button class="tab-btn" id="tabFav">我的收藏 (<span id="favCount">0</span>)</button>
  </div>

  <div class="card" id="jokeCard" aria-live="polite" aria-label="冷笑话列表"></div>
  <div class="fav-panel" id="favPanel">
    <div class="fav-list" id="favList"></div>
  </div>

  <div id="debug"></div>
  <button class="btn" id="mainBtn">再来三个</button>
</div>

let currentJokes = [];
let shown = new Set();   // 跟踪已展示过的笑话索引，避免池子耗尽前重复
let mode = 'random';

// 缓存收藏列表，避免同一次渲染中反复 parse localStorage
let _favsCache = null;
function favs() {
  if (_favsCache === null) {
    try { _favsCache = JSON.parse(localStorage.getItem('coldjokes_favs') || '[]'); }
    catch(e) { _favsCache = []; }
  }
  return _favsCache;
}

function saveFavs(arr) {
  _favsCache = arr;
  localStorage.setItem('coldjokes_favs', JSON.stringify(arr));
}

function isFaved(text) {
  return favs().includes(text);
}

function toggleFav(text) {
  const f = favs();
  const idx = f.indexOf(text);
  if (idx > -1) { f.splice(idx, 1); }
  else { f.push(text); }
  saveFavs(f);
  return idx === -1;
}

function nextBatch() {
  const available = [];
  for (let i = 0; i < pool.length; i++) {
    if (!shown.has(i)) available.push(i);
  }
  if (available.length < 3) {
    shown.clear();
    for (let i = 0; i < pool.length; i++) available.push(i);
  }
  const batch = [];
  for (let j = 0; j < 3; j++) {
    const r = Math.floor(Math.random() * available.length);
    const idx = available.splice(r, 1)[0];
    shown.add(idx);
    batch.push(pool[idx]);
  }
  return batch;
}

function render(jokes) {
  currentJokes = jokes;
  const card = document.getElementById('jokeCard');
  card.innerHTML = '';
  jokes.forEach((j, i) => {
    const div = document.createElement('div');
    div.className = 'joke-card';

    const idx = document.createElement('span');
    idx.className = 'joke-index';
    idx.textContent = i + 1;

    const text = document.createElement('span');
    text.className = 'joke-text';
    text.textContent = j;

    const actions = document.createElement('div');
    actions.className = 'actions';

    const favBtn = document.createElement('button');
    favBtn.className = 'icon-btn fav-btn';
    favBtn.setAttribute('aria-label', '收藏');
    const updateFavBtn = () => {
      if (isFaved(j)) {
        favBtn.textContent = '♥';
        favBtn.classList.add('faved');
        favBtn.setAttribute('aria-label', '取消收藏');
      } else {
        favBtn.textContent = '♡';
        favBtn.classList.remove('faved');
        favBtn.setAttribute('aria-label', '收藏');
      }
    };
    updateFavBtn();
    favBtn.addEventListener('click', function() {
      toggleFav(j);
      updateFavBtn();
      if (mode === 'fav') showFavs();
      updateFavCount();
    });

    const copyBtn = document.createElement('button');
    copyBtn.className = 'icon-btn';
    copyBtn.textContent = '复制';
    copyBtn.addEventListener('click', function() {
      navigator.clipboard.writeText(j);
      copyBtn.textContent = '已复制';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '复制';
        copyBtn.classList.remove('copied');
      }, 1500);
    });

    actions.appendChild(favBtn);
    actions.appendChild(copyBtn);
    div.appendChild(idx);
    div.appendChild(text);
    div.appendChild(actions);
    card.appendChild(div);
  });
}

function showFavs() {
  const f = favs();
  const list = document.getElementById('favList');
  list.innerHTML = '';
  if (f.length === 0) {
    list.innerHTML = '<div class="fav-empty">还没有收藏任何冷笑话，去随机模式里点 &#9825; 吧</div>';
    return;
  }
  f.forEach((text, i) => {
    const div = document.createElement('div');
    div.className = 'fav-item';

    const num = document.createElement('span');
    num.className = 'fav-num';
    num.textContent = i + 1;

    const t = document.createElement('span');
    t.className = 'fav-text';
    t.textContent = text;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'icon-btn';
    copyBtn.textContent = '复制';
    copyBtn.addEventListener('click', function() {
      navigator.clipboard.writeText(text);
      copyBtn.textContent = '已复制';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '复制';
        copyBtn.classList.remove('copied');
      }, 1500);
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'icon-btn del-btn';
    delBtn.textContent = '删除';
    delBtn.addEventListener('click', function() {
      if (!confirm('确定要删除这条收藏吗？')) return;
      const f2 = favs();
      const idx = f2.indexOf(text);
      if (idx > -1) { f2.splice(idx, 1); saveFavs(f2); }
      showFavs();
      updateFavCount();
    });

    div.appendChild(num);
    div.appendChild(t);
    div.appendChild(copyBtn);
    div.appendChild(delBtn);
    list.appendChild(div);
  });
}

function updateFavCount() {
  document.getElementById('favCount').textContent = favs().length;
}

function setMode(m) {
  mode = m;
  const url = new URL(window.location);
  url.searchParams.set('tab', m);
  window.history.replaceState({}, '', url);
  document.getElementById('tabRandom').classList.toggle('active', m === 'random');
  document.getElementById('tabFav').classList.toggle('active', m === 'fav');
  document.getElementById('jokeCard').style.display = m === 'random' ? 'flex' : 'none';
  document.getElementById('favPanel').style.display = m === 'fav' ? 'block' : 'none';
  document.getElementById('mainBtn').style.display = m === 'random' ? 'inline-block' : 'none';
  document.getElementById('debug').style.display = m === 'random' ? 'block' : 'none';
  if (m === 'fav') showFavs();
  // 仅在首次加载时拉取，避免切标签页丢笑话
  if (m === 'random' && currentJokes.length === 0) refresh();
}

function refresh() {
  render(nextBatch());
}

document.getElementById('tabRandom').addEventListener('click', () => setMode('random'));
document.getElementById('tabFav').addEventListener('click', () => setMode('fav'));
document.getElementById('mainBtn').addEventListener('click', () => { if (mode === 'random') refresh(); });

updateFavCount();
const initMode = new URL(window.location).searchParams.get('tab') || 'random';
setMode(initMode);
</script>
</body>
